<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUIDGen - UUID/GUID生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.app{max-width:800px;margin:0 auto;padding:20px;}
.header{text-align:center;margin-bottom:24px;}
.header h1{font-size:1.5em;} .header h1 span{color:#a78bfa;}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;}
.card h2{font-size:14px;margin-bottom:12px;color:#94a3b8;}
.options{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.option{display:flex;align-items:center;gap:8px;}
.option label{font-size:13px;color:#64748b;}
.option select,.option input{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px 12px;font-size:13px;}
.btn{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;}
.btn-primary{background:#a78bfa;color:#000;}
.btn-primary:hover{background:#8b5cf6;}
.btn-secondary{background:#334155;color:#e2e8f0;}
.btn-secondary:hover{background:#475569;}
.results{background:#0f172a;border-radius:8px;padding:12px;}
.result-item{display:flex;align-items:center;gap:12px;padding:8px;border-bottom:1px solid #1e293b;}
.result-item:last-child{border-bottom:none;}
.result-item .uuid{flex:1;font-family:'Courier New',monospace;font-size:14px;color:#a78bfa;}
.result-item .copy{background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;}
.result-item .copy:hover{color:#a78bfa;}
.batch-input{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.batch-input input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px 12px;font-size:13px;}
.stats{display:flex;gap:16px;padding:12px;background:#1e293b;border-radius:8px;margin-top:12px;font-size:13px;}
.stats span{color:#64748b;}
.stats strong{color:#e2e8f0;}
.formats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;}
.format-item{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;}
.format-item label{font-size:11px;color:#64748b;display:block;margin-bottom:4px;}
.format-item .value{font-family:'Courier New',monospace;font-size:12px;color:#a78bfa;word-break:break-all;}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1><span>UUID</span>Gen</h1></div>
  
  <div class="card">
    <h2>生成选项</h2>
    <div class="options">
      <div class="option">
        <label>版本:</label>
        <select id="version">
          <option value="v4">v4 (随机)</option>
          <option value="v1">v1 (时间戳)</option>
        </select>
      </div>
      <div class="option">
        <label>格式:</label>
        <select id="format">
          <option value="standard">标准 (8-4-4-4-12)</option>
          <option value="nodash">无连字符</option>
          <option value="braces">带花括号</option>
          <option value="uppercase">大写</option>
        </select>
      </div>
      <div class="option">
        <label>数量:</label>
        <input type="number" id="count" value="5" min="1" max="100">
      </div>
    </div>
    <button class="btn btn-primary" onclick="generate()" style="width:100%">生成</button>
  </div>
  
  <div class="card">
    <h2>生成结果</h2>
    <div class="results" id="results"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-secondary" onclick="copyAll()">📋 复制全部</button>
      <button class="btn btn-secondary" onclick="download()">💾 下载</button>
      <button class="btn btn-secondary" onclick="clearResults()">清空</button>
    </div>
  </div>
  
  <div class="card">
    <h2>当前UUID格式</h2>
    <div class="formats" id="formats"></div>
  </div>
</div>

<script>
let generated = [];

function generateUUIDv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function generateUUIDv1() {
  const now = Date.now();
  const time = (now * 10000 + 122192928000000000).toString(16).padStart(15, '0');
  const clock = (Math.random() * 0x3fff | 0x8000).toString(16).padStart(4, '0');
  const node = Array.from({length: 6}, () => (Math.random() * 256 | 0).toString(16).padStart(2, '0')).join('');
  return `${time.slice(0, 8)}-${time.slice(8, 12)}-1${time.slice(12, 15)}-${clock}-${node}`;
}

function formatUUID(uuid) {
  const format = document.getElementById('format').value;
  switch (format) {
    case 'nodash': return uuid.replace(/-/g, '');
    case 'braces': return `{${uuid}}`;
    case 'uppercase': return uuid.toUpperCase();
    default: return uuid;
  }
}

function generate() {
  const version = document.getElementById('version').value;
  const count = parseInt(document.getElementById('count').value) || 1;
  
  generated = [];
  for (let i = 0; i < count; i++) {
    const uuid = version === 'v1' ? generateUUIDv1() : generateUUIDv4();
    generated.push(formatUUID(uuid));
  }
  
  renderResults();
  renderFormats();
}

function renderResults() {
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = generated.map((uuid, i) => `
    <div class="result-item">
      <span style="color:#64748b;font-size:12px">${i + 1}.</span>
      <span class="uuid">${uuid}</span>
      <button class="copy" onclick="copyOne('${uuid}')">📋</button>
    </div>
  `).join('');
}

function renderFormats() {
  if (generated.length === 0) return;
  
  const uuid = generated[0];
  const raw = uuid.replace(/[{}-]/g, '').toLowerCase();
  
  document.getElementById('formats').innerHTML = `
    <div class="format-item">
      <label>标准</label>
      <div class="value">${raw.slice(0,8)}-${raw.slice(8,12)}-${raw.slice(12,16)}-${raw.slice(16,20)}-${raw.slice(20)}</div>
    </div>
    <div class="format-item">
      <label>无连字符</label>
      <div class="value">${raw}</div>
    </div>
    <div class="format-item">
      <label>大写</label>
      <div class="value">${raw.toUpperCase()}</div>
    </div>
    <div class="format-item">
      <label>URN</label>
      <div class="value">urn:uuid:${raw}</div>
    </div>
  `;
}

function copyOne(uuid) {
  navigator.clipboard.writeText(uuid);
}

function copyAll() {
  navigator.clipboard.writeText(generated.join('\n'));
}

function download() {
  const text = generated.join('\n');
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'uuids.txt';
  a.click();
}

function clearResults() {
  generated = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('formats').innerHTML = '';
}

generate();
</script>
</body>
</html>
